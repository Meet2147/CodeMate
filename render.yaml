services:
  - type: web
    name: codemate-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: codemate-backend
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: AUTH_TOKEN_TTL_SECONDS
        value: "2592000"
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_SCOPE
        value: read:user user:email
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: DEFAULT_AUTH_REDIRECT_URI
        sync: false
      - key: ALLOWED_AUTH_REDIRECTS
        sync: false
      - key: PAYPAL_ENV
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false

  - type: static_site
    name: codemate-web
    rootDir: .
    plan: free
    buildCommand: |
      API_BASE_CLEAN="${CODEMATE_API_BASE%/}"
      printf "window.CODEMATE_API_BASE = \"%s\";\n" "$API_BASE_CLEAN" > web/config.js
    publishPath: web
    envVars:
      - key: CODEMATE_API_BASE
        sync: false
